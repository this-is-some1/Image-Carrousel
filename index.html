<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrousel des images</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <h1>Le carrousel des images</h1>
</header>
<body>
    <button id="add">Ajouter des personnes</button>
    <button id="rst">Reset</button>
    <div class="container">
        <div class="carousel">
            <h2 id="name"></h2>
            <button class="nav prev" onclick="prevImage()"><i class="fas fa-chevron-left"></i></button>
            <a id="link-wp" onclick="get_url()">
                <img id="carouselImage"/> <!-- src="./assets/Alan_Turing.jpg">-->
            </a>
            <button class="nav next" onclick="nextImage()"><i class="fas fa-chevron-right"></i></button>
            <p id="description"></p>
        </div>
    </div>
    <script src="index1.js"></script>
</body>
<footer>
    <p>Made by <a href="https://github.com/this-is-some1" target="_blank">some1</a></p>
</footer>
</html>
